<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Alves – Compre de Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1B4332;--gm:#2D6A4F;--gl:#52B788;--gp:#D8F3DC;
  --y:#F5A623;--yd:#D4891C;--red:#E63946;
  --gray50:#F8F9FA;--gray100:#F1F3F4;--gray200:#E8EAED;
  --gray400:#9AA0A6;--gray600:#5F6368;--text:#1C1C1E;--textm:#6B7280;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--gray50);color:var(--text);min-height:100vh;padding-bottom:72px;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;border:none;}

/* HEADER */
.header{background:var(--g);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header-inner{display:flex;align-items:center;gap:12px;padding:10px 16px;max-width:1200px;margin:0 auto;}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo-icon{font-size:26px;}
.logo-name{font-size:16px;font-weight:800;color:white;line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.6);}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;border:none;outline:none;background:white;border-radius:var(--r24);padding:9px 16px 9px 38px;font-size:14px;color:var(--text);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray400);font-size:15px;pointer-events:none;}
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border-radius:var(--r12);box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;display:none;max-height:300px;overflow-y:auto;}
.search-dropdown.open{display:block;}
.sd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .12s;}
.sd-item:hover{background:var(--gray50);}
.sd-emoji{font-size:22px;width:36px;text-align:center;}
.sd-name{font-size:13px;font-weight:600;}
.sd-price{font-size:12px;color:var(--gm);font-weight:600;}
.sd-label{padding:5px 14px;font-size:11px;color:var(--gray400);background:var(--gray50);border-top:1px solid var(--gray200);}
.header-btns{display:flex;align-items:center;gap:6px;}
.btn-auth{display:flex;align-items:center;gap:5px;color:white;font-size:13px;font-weight:500;padding:7px 11px;border-radius:var(--r8);background:rgba(255,255,255,.12);border:none;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-auth:hover{background:rgba(255,255,255,.2);}
.cart-btn{background:var(--y);border:none;border-radius:var(--r8);padding:9px 13px;color:var(--g);position:relative;cursor:pointer;transition:transform .15s;}
.cart-btn:hover{transform:scale(1.05);}
.cart-count{position:absolute;top:-5px;right:-5px;background:var(--red);color:white;font-size:10px;font-weight:700;border-radius:999px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.cat-nav{display:flex;gap:4px;padding:7px 16px 9px;overflow-x:auto;scrollbar-width:none;max-width:1200px;margin:0 auto;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.85);font-size:12px;font-weight:500;padding:5px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:background .15s;}
.cat-btn.active{background:var(--y);color:var(--g);}
.cat-btn:hover:not(.active){background:rgba(255,255,255,.22);}

/* HERO */
.hero{background:linear-gradient(135deg,var(--g),var(--gm));padding:36px 16px 28px;color:white;}
.hero-inner{max-width:1200px;margin:0 auto;}
.hero-eye{font-size:13px;font-weight:600;color:var(--y);margin-bottom:10px;}
.hero h1{font-size:clamp(24px,4vw,40px);font-weight:800;line-height:1.18;margin-bottom:10px;}
.hero-sub{font-size:14px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:20px;}
.hero-sub strong{color:var(--y);}
.btn-hero{background:var(--y);color:var(--g);border:none;font-size:14px;font-weight:700;padding:13px 26px;border-radius:var(--r24);cursor:pointer;box-shadow:0 4px 14px rgba(245,166,35,.4);transition:transform .15s;}
.btn-hero:hover{transform:translateY(-2px);}
.hero-badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.hero-badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:var(--r8);padding:7px 13px;font-size:12px;font-weight:500;}

/* SECTIONS */
.section{padding:24px 16px;max-width:1200px;margin:0 auto;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-hdr h2{font-size:18px;font-weight:700;}
.btn-ver{background:none;border:none;color:var(--gm);font-size:13px;font-weight:600;padding:5px 10px;border-radius:var(--r8);cursor:pointer;}
.btn-ver:hover{background:var(--gp);}

/* GRIDS */
.promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}

/* CARD */
.card{background:white;border-radius:var(--r16);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .18s,box-shadow .18s;position:relative;}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.card-img{width:100%;aspect-ratio:1;background:var(--gray50);display:flex;align-items:center;justify-content:center;font-size:52px;}
.promo-ribbon{position:absolute;top:10px;left:-3px;background:var(--red);color:white;font-size:11px;font-weight:700;padding:3px 9px 3px 11px;border-radius:0 4px 4px 0;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.promo-ribbon::before{content:'';position:absolute;left:0;bottom:-4px;width:4px;height:4px;background:#9b1c23;clip-path:polygon(0 0,100% 0,100% 100%);}
.peso-badge{position:absolute;top:8px;right:8px;background:var(--g);color:white;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;}
.card-body{padding:9px 11px 11px;}
.card-brand{font-size:10px;color:var(--gray400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.card-name{font-size:12px;font-weight:600;line-height:1.3;min-height:30px;margin-bottom:5px;}
.card-unit{font-size:10px;color:var(--gray400);margin-bottom:5px;}
.price-row{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.price-orig{font-size:11px;color:var(--gray400);text-decoration:line-through;}
.price-now{font-size:16px;font-weight:800;color:var(--g);}
.price-peso{font-size:11px;color:var(--gray600);font-style:italic;}
.promo-badge{display:inline-block;background:var(--y);color:var(--g);font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-bottom:5px;}
.btn-add{width:100%;background:var(--g);color:white;border:none;border-radius:var(--r8);padding:8px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:background .15s;}
.btn-add:hover{background:var(--gm);}
.btn-add:active{transform:scale(.97);}
.qty-ctrl{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--gp);border-radius:var(--r8);}
.qty-btn{background:none;border:none;width:32px;height:32px;font-size:18px;color:var(--g);font-weight:700;cursor:pointer;}
.qty-n{font-size:14px;font-weight:700;color:var(--g);}

/* EMPTY */
.empty{text-align:center;padding:40px 16px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:14px;color:var(--textm);}

/* CART SIDEBAR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.cart-sidebar{position:fixed;top:0;right:0;height:100%;width:min(400px,100vw);background:white;z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.12);}
.cart-sidebar.open{transform:translateX(0);}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--gray200);}
.cart-hdr h3{font-size:17px;font-weight:700;}
.cart-close-btn{background:var(--gray100);border:none;border-radius:var(--r8);width:30px;height:30px;font-size:14px;color:var(--gray600);cursor:pointer;}
.cart-items{flex:1;overflow-y:auto;padding:14px 18px;}
.cart-empty-box{text-align:center;padding:50px 0;color:var(--gray400);}
.cart-empty-box p:first-child{font-size:42px;margin-bottom:8px;}
.ci{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--gray100);align-items:center;}
.ci-emoji{font-size:28px;width:42px;text-align:center;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-price{font-size:12px;color:var(--g);font-weight:600;margin-top:2px;}
.ci-peso-note{font-size:10px;color:var(--yd);font-style:italic;}
.ci-qty{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.cq-btn{background:var(--gray100);border:none;border-radius:var(--r8);width:26px;height:26px;font-size:15px;color:var(--text);font-weight:700;cursor:pointer;transition:background .12s;}
.cq-btn:hover{background:var(--gray200);}
.cq-n{font-size:13px;font-weight:700;min-width:18px;text-align:center;}
.cart-footer{padding:14px 18px;border-top:1px solid var(--gray200);}
.cart-sub-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;}
.cart-sub-row span:last-child{font-weight:700;color:var(--g);font-size:17px;}
.frete-note{font-size:12px;color:var(--textm);margin-bottom:12px;}
.frete-note .ok{color:var(--gm);font-weight:600;}
.frete-prog{height:4px;background:var(--gray200);border-radius:999px;margin-top:5px;overflow:hidden;}
.frete-bar{height:100%;background:var(--gl);border-radius:999px;transition:width .4s;}
.btn-checkout{width:100%;background:var(--g);color:white;border:none;border-radius:var(--r16);padding:15px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-checkout:hover{background:var(--gm);}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:#202124;color:white;padding:10px 22px;border-radius:var(--r24);font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray200);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;font-size:10px;color:var(--gray400);background:none;border:none;cursor:pointer;transition:color .15s;}
.bnav-item.active,.bnav-item:hover{color:var(--g);}
.bnav-cart{background:var(--g);color:white!important;border-radius:var(--r16) var(--r16) 0 0;margin:-8px 4px 0;padding-top:14px;position:relative;}
.bnav-cart:hover{background:var(--gm)!important;}
.bnav-badge{position:absolute;top:6px;right:10px;background:var(--y);color:var(--g);font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:var(--r16);padding:24px 20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .22s;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-overlay.open .modal{transform:scale(1);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-hdr h3{font-size:17px;font-weight:700;}
.modal-close{background:var(--gray100);border:none;border-radius:var(--r8);width:30px;height:30px;font-size:14px;color:var(--gray600);cursor:pointer;}

/* FORMS */
.form-grp{margin-bottom:14px;}
.form-grp label{display:block;font-size:11px;font-weight:700;color:var(--textm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.form-grp input,.form-grp select,.form-grp textarea{width:100%;border:1.5px solid var(--gray200);border-radius:var(--r8);padding:10px 12px;font-size:14px;color:var(--text);background:var(--gray50);outline:none;transition:border-color .15s,background .15s;font-family:inherit;}
.form-grp input:focus,.form-grp select:focus{border-color:var(--g);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-prim{width:100%;background:var(--g);color:white;border:none;border-radius:var(--r12);padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s;}
.btn-prim:hover{background:var(--gm);}
.btn-sec{width:100%;background:transparent;color:var(--g);border:1.5px solid var(--g);border-radius:var(--r12);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s;}
.btn-sec:hover{background:var(--gp);}

/* CHECKOUT */
.steps{display:flex;gap:0;margin-bottom:20px;}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
.step::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--gray200);}
.step:last-child::after{display:none;}
.step.done::after{background:var(--g);}
.step-c{width:26px;height:26px;border-radius:50%;background:var(--gray200);color:var(--gray400);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1;position:relative;}
.step.active .step-c,.step.done .step-c{background:var(--g);color:white;}
.step-l{font-size:10px;color:var(--gray400);text-align:center;}
.step.active .step-l{color:var(--g);font-weight:600;}
.eo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.eo{border:2px solid var(--gray200);border-radius:var(--r12);padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.eo:hover{border-color:var(--gl);}
.eo.sel{border-color:var(--g);background:var(--gp);}
.eo-icon{font-size:26px;margin-bottom:5px;}
.eo p{font-size:13px;font-weight:600;margin-bottom:3px;}
.eo small{font-size:11px;color:var(--textm);}
.pay-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.po{border:2px solid var(--gray200);border-radius:var(--r12);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.po:hover{border-color:var(--gl);}
.po.sel{border-color:var(--g);background:var(--gp);}
.po-icon{font-size:22px;}
.po-name{font-size:14px;font-weight:600;}
.po-sub{font-size:11px;color:var(--textm);}
.pix-box{background:var(--gray50);border:1px solid var(--gray200);border-radius:var(--r12);padding:20px;text-align:center;}
.pix-qr{width:140px;height:140px;background:white;border:1px solid var(--gray200);border-radius:var(--r8);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:64px;}
.pix-code{background:white;border:1px solid var(--gray200);border-radius:var(--r8);padding:8px 12px;font-family:monospace;font-size:10px;word-break:break-all;text-align:left;color:var(--gray600);margin:10px 0;}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;}
.s-ag{background:#FFF3CD;color:#856404;}
.s-pg{background:#D1E7DD;color:#0A3622;}
.s-sp{background:#CFF4FC;color:#055160;}
.s-en{background:#E8D5F5;color:#4A0C6B;}
.s-ok{background:#D1E7DD;color:#0A3622;}

/* ADMIN */
.admin-wrap{min-height:100vh;background:var(--gray100);}
.admin-topbar{background:#1a1a1a;color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.admin-topbar h1{font-size:15px;font-weight:700;}
.admin-tabs{display:flex;border-bottom:1px solid var(--gray200);background:white;overflow-x:auto;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.atab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--gray400);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;}
.atab.active{color:var(--g);border-bottom-color:var(--g);}
.admin-body{padding:16px;max-width:1200px;margin:0 auto;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:white;border-radius:var(--r12);padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.stat-l{font-size:11px;color:var(--gray400);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat-v{font-size:24px;font-weight:800;color:var(--text);}
.stat-s{font-size:11px;color:var(--gm);margin-top:3px;}
.table-card{background:white;border-radius:var(--r12);box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.table-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--gray100);}
.table-hdr h3{font-size:15px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray400);padding:9px 14px;background:var(--gray50);border-bottom:1px solid var(--gray200);text-align:left;white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--gray100);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--gray50);}
.tgl{position:relative;width:36px;height:20px;display:inline-block;}
.tgl input{opacity:0;width:0;height:0;}
.tsldr{position:absolute;cursor:pointer;inset:0;background:var(--gray200);border-radius:999px;transition:background .2s;}
.tsldr::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:transform .2s;}
input:checked+.tsldr{background:var(--g);}
input:checked+.tsldr::before{transform:translateX(16px);}
.btn-sm{border:none;border-radius:var(--r8);padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;}
.bsm-edit{background:var(--gray100);color:var(--gray600);}
.bsm-del{background:#FFEDED;color:var(--red);}
.bsm-adv{background:var(--gp);color:var(--g);}
input[type=number].estoque-inp{width:65px;border:1.5px solid var(--gray200);border-radius:var(--r8);padding:4px 7px;font-size:12px;outline:none;font-family:inherit;}
.promo-card-admin{background:white;border-radius:var(--r12);padding:13px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}

@media(min-width:768px){
  body{padding-bottom:0;}
  .bottom-nav{display:none;}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));}
  .hero h1{font-size:42px;}
}
@media(max-width:480px){
  .btn-auth span{display:none;}
  .logo-sub{display:none;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ESTRUTURA PRINCIPAL -->
<div id="app"></div>

<!-- OVERLAY + CARRINHO -->
<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>
<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-hdr">
    <h3>🛒 Meu Carrinho</h3>
    <button class="cart-close-btn" onclick="fecharCarrinho()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div id="cartFooter" style="display:none"></div>
</aside>

<!-- MODAL GLOBAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// BANCO DE DADOS

const R = v => v==null?'—':v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const DESC = (o,n) => Math.round((1-n/o)*100);
const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2300);
}
function abrirModal(html){
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
function fecharModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay'))fecharModal();
});

// CARRINHO
// ============================================================
const subTotal  = () => carrinho.reduce((a,i)=>a+(i.peso||!i.preco?0:i.preco*i.qtd),0);
const qtdTotal  = () => carrinho.reduce((a,i)=>a+i.qtd,0);
const calcFrete = () => { const s=subTotal(); return s===0?null:s>=200?0:8.90; };

function adicionarAoCarrinho(id){
  const p=produtos.find(x=>x.id===id); if(!p)return;
  const ex=carrinho.find(i=>i.id===id);
  if(ex) ex.qtd++;
  else carrinho.push({id:p.id,nome:p.nome,e:p.e,preco:p.preco,peso:p.peso,qtd:1});
  salvar(); renderCarrinho(); render(); toast('✅ '+p.nome+' adicionado!');
}
function removerDoCarrinho(id){
  const i=carrinho.findIndex(x=>x.id===id); if(i<0)return;
  if(carrinho[i].qtd>1) carrinho[i].qtd--;
  else carrinho.splice(i,1);
  salvar(); renderCarrinho(); render();
}
function getQtd(id){const i=carrinho.find(x=>x.id===id);return i?i.qtd:0;}

function abrirCarrinho(){
  document.getElementById('cartSidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderCarrinho();
}
function fecharCarrinho(){
  document.getElementById('cartSidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderCarrinho(){
  const el=document.getElementById('cartItems');
  const ft=document.getElementById('cartFooter');
  if(carrinho.length===0){
    el.innerHTML='<div class="cart-empty-box"><p>🛒</p><p>Carrinho vazio</p></div>';
    ft.style.display='none'; return;
  }
  el.innerHTML=carrinho.map(i=>`
    <div class="ci">
      <div class="ci-emoji">${i.e}</div>
      <div class="ci-info">
        <div class="ci-name">${i.nome}</div>
        ${i.peso
          ?`<div class="ci-price">A confirmar</div><div class="ci-peso-note">⚖️ Preço por peso</div>`
          :`<div class="ci-price">${R(i.preco*i.qtd)}</div>`}
      </div>
      <div class="ci-qty">
        <button class="cq-btn" onclick="removerDoCarrinho(${i.id})">−</button>
        <span class="cq-n">${i.qtd}</span>
        <button class="cq-btn" onclick="adicionarAoCarrinho(${i.id})">+</button>
      </div>
    </div>`).join('');
  const sub=subTotal(), fr=calcFrete(), prog=Math.min((sub/200)*100,100);
  ft.style.display='block';
  ft.innerHTML=`
    <div style="padding:14px 18px;border-top:1px solid var(--gray200);">
      <div class="cart-sub-row"><span>Subtotal</span><span>${R(sub)}</span></div>
      <div class="frete-note">
        ${fr===0?`<span class="ok">🎉 Frete grátis!</span>`
          :`Falta ${R(200-sub)} para frete grátis<div class="frete-prog"><div class="frete-bar" style="width:${prog}%"></div></div>`}
      </div>
      <button class="btn-checkout" onclick="fecharCarrinho();iniciarCheckout()">Finalizar pedido →</button>
    </div>`;
}

function iniciarCheckout(){
  if(!usuario){toast('Faça login para continuar');setTimeout(()=>{pagina='login';render();},800);return;}
  ckStep=1;ckEntrega='';ckPag='';ckEndereco={};
  renderCheckout();
}

function irPasso(n){ckStep=n;renderCheckout();}

function salvarEnderecoEIr(){
  const cep=document.getElementById('ck-cep')?.value;
  const num=document.getElementById('ck-num')?.value;
  if(!cep||!num){toast('Informe o CEP e número');return;}
  ckEndereco={
    cep,numero:num,
    rua:document.getElementById('ck-rua')?.value||'',
    bairro:document.getElementById('ck-bairro')?.value||'',
    cidade:document.getElementById('ck-cidade')?.value||'',
    complemento:document.getElementById('ck-comp')?.value||''
  };
  irPasso(3);
}

function preencherEndSalvo(){
  const end=usuario?.endereco||{};
  if(document.getElementById('ck-cep'))document.getElementById('ck-cep').value=end.cep||'';
  if(document.getElementById('ck-num'))document.getElementById('ck-num').value=end.numero||'';
  if(document.getElementById('ck-rua'))document.getElementById('ck-rua').value=end.rua||'';
  if(document.getElementById('ck-bairro'))document.getElementById('ck-bairro').value=end.bairro||'';
  if(document.getElementById('ck-cidade'))document.getElementById('ck-cidade').value=end.cidade||'';
  if(document.getElementById('ck-comp'))document.getElementById('ck-comp').value=end.complemento||'';
  toast('Endereço preenchido!');
}

async function buscarCEP(){
  const cep=document.getElementById('ck-cep')?.value.replace(/\D/g,'');
  if(cep?.length!==8)return;
  try{

function buscarProdutos(termo){
  const t=norm(termo);
  const ativos=produtos.filter(p=>p.ativo&&p.estoque>0);
  const enc=ativos.filter(p=>norm(p.nome).includes(t)||norm(p.marca).includes(t)||p.tags.some(tg=>tg.includes(t)));
  const ind=INDISPONIVEIS.find(p=>norm(p.nome).includes(t)||p.tags.some(tg=>tg.includes(t)));
  let sim=[];
  if(ind&&enc.length===0) sim=ativos.filter(p=>p.cat===ind.cat&&p.tags.some(tg=>ind.tags.includes(tg)));
  return{enc,ind,sim};
}

async function buscarCEPCadastro(){
  const cep=document.getElementById('cd-cep')?.value.replace(/\D/g,'');
  if(cep?.length!==8)return;
  try{const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');const d=await r.json();if(d.erro)return;if(document.getElementById('cd-rua'))document.getElementById('cd-rua').value=d.logradouro||'';if(document.getElementById('cd-bairro'))document.getElementById('cd-bairro').value=d.bairro||'';if(document.getElementById('cd-cidade'))document.getElementById('cd-cidade').value=d.localidade||'';}catch(e){}
}

function validarCPF(cpf){
  cpf=cpf.replace(/\D/g,'');
  if(cpf.length!==11||/^(\d)\1+$/.test(cpf))return false;
  let s=0;for(let i=0;i<9;i++)s+=parseInt(cpf[i])*(10-i);
  let r=(s*10)%11;if(r===10||r===11)r=0;if(r!==parseInt(cpf[9]))return false;
  s=0;for(let i=0;i<10;i++)s+=parseInt(cpf[i])*(11-i);
  r=(s*10)%11;if(r===10||r===11)r=0;return r===parseInt(cpf[10]);
}

function fazerCadastro(){
  const nome=document.getElementById('cd-nome')?.value.trim();
  const cpf=document.getElementById('cd-cpf')?.value;
  const tel=document.getElementById('cd-tel')?.value;

  const senha=document.getElementById('cd-senha')?.value;

  const num=document.getElementById('cd-num')?.value;
  if(!nome||!cpf||!tel||!email||!senha||!cep||!num){toast('Preencha todos os campos *');return;}
  if(!validarCPF(cpf)){toast('CPF inválido');return;}
  if(senha.length<6){toast('Senha precisa ter mínimo 6 caracteres');return;}
  const usuarios=JSON.parse(localStorage.getItem('ma_usuarios')||'[]');
  if(usuarios.find(u=>u.email===email)){toast('E-mail já cadastrado');return;}
  const u={id:Date.now(),nome,cpf,telefone:tel,email,senha,endereco:{cep,numero:num,rua:document.getElementById('cd-rua')?.value||'',bairro:document.getElementById('cd-bairro')?.value||'',cidade:document.getElementById('cd-cidade')?.value||''},criadoEm:new Date().toISOString()};

  localStorage.setItem('ma_usuarios',JSON.stringify(usuarios));
  usuario=u;salvar();
  toast('✅ Conta criada!');pagina='site';render();
}

          <span style="font-size:20px;">💬</span><span style="font-size:14px;font-weight:500;flex:1;">Falar com o mercado</span><span style="color:var(--gray400);">›</span>
        </div>
      </div>
      <button onclick="usuario=null;salvar();pagina='site';render()" style="width:100%;background:#FFEDED;color:var(--red);border:none;border-radius:var(--r12);padding:13px;font-size:14px;font-weight:600;cursor:pointer;">Sair da conta</button>
    </div>
    <nav class="bottom-nav">
      <button class="bnav-item" onclick="pagina='site';render()">🏠<span>Início</span></button>
      <button class="bnav-item" onclick="pagina='site';render()">🔲<span>Produtos</span></button>
      <button class="bnav-item bnav-cart" onclick="abrirCarrinho()">🛒<span class="bnav-badge">${qtdTotal()}</span></button>
      <button class="bnav-item" onclick="pagina='meus-pedidos';render()">📦<span>Pedidos</span></button>
      <button class="bnav-item active">👤<span>Conta</span></button>
    </nav>`;
}

// ============================================================
// PÁGINA MEUS PEDIDOS
// ============================================================
function htmlMeusPedidos(){
  const ST={aguardando_pagamento:{l:'Ag. pagamento',c:'s-ag'},pagamento_confirmado:{l:'Pago',c:'s-pg'},em_separacao:{l:'Separando',c:'s-sp'},saiu_entrega:{l:'Em entrega',c:'s-en'},pronto_retirada:{l:'P/ retirada',c:'s-en'},entregue:{l:'Entregue',c:'s-ok'},retirado:{l:'Retirado',c:'s-ok'}};
  return`
    <div style="background:var(--g);padding:14px 16px;display:flex;align-items:center;gap:12px;">
      <button onclick="pagina='site';render()" style="background:rgba(255,255,255,.15);border:none;border-radius:var(--r8);width:34px;height:34px;color:white;font-size:18px;cursor:pointer;">←</button>
      <h2 style="color:white;font-size:17px;font-weight:700;">Meus Pedidos</h2>
    </div>
    <div style="max-width:600px;margin:0 auto;padding:16px;">
      ${pedidos.length===0?`<div class="empty"><div class="empty-icon">📦</div><h3>Nenhum pedido ainda</h3><p style="margin-bottom:20px;">Faça sua primeira compra!</p><button class="btn-prim" style="max-width:220px;margin:0 auto;" onclick="pagina='site';render()">Ver produtos</button></div>`
      :pedidos.map(p=>{const st=ST[p.status]||{l:p.status,c:'s-ag'};const dt=new Date(p.data).toLocaleDateString('pt-BR');const ni=p.itens.reduce((a,i)=>a+i.qtd,0);
        return`<div style="background:white;border-radius:var(--r16);margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--gray100);">
            <div><div style="font-size:14px;font-weight:700;">${p.id}</div><div style="font-size:11px;color:var(--textm);">${dt}</div></div>
            <span class="status-badge ${st.c}">${st.l}</span>
          </div>
          <div style="padding:12px 16px;">
            <div style="font-size:13px;color:var(--textm);margin-bottom:8px;">${p.itens.slice(0,3).map(i=>i.e+' '+i.nome).join(' · ')}${p.itens.length>3?' +'+( p.itens.length-3):''}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:12px;color:var(--textm);">${ni} ${ni===1?'item':'itens'} · ${p.tipoEntrega==='retirada'?'🏪 Retirada':'🚚 Entrega'}</span>
              <span style="font-size:15px;font-weight:800;color:var(--g);">${R(p.subtotal+p.frete)}</span>
            </div>
          </div>
        </div>`;

    </div>
    <nav class="bottom-nav">
      <button class="bnav-item" onclick="pagina='site';render()">🏠<span>Início</span></button>
      <button class="bnav-item" onclick="pagina='site';render()">🔲<span>Produtos</span></button>
      <button class="bnav-item bnav-cart" onclick="abrirCarrinho()">🛒<span class="bnav-badge">${qtdTotal()}</span></button>
      <button class="bnav-item active">📦<span>Pedidos</span></button>
      <button class="bnav-item" onclick="pagina=${usuario?`'conta'`:`'login'`};render()">👤<span>Conta</span></button>
    </nav>`;
}

// ============================================================
// PAINEL ADMIN
// ============================================================
function htmlAdmin(){
  const ST={aguardando_pagamento:{l:'Ag. pagamento',c:'s-ag'},pagamento_confirmado:{l:'Pago',c:'s-pg'},em_separacao:{l:'Separando',c:'s-sp'},saiu_entrega:{l:'Em entrega',c:'s-en'},pronto_retirada:{l:'P/ retirada',c:'s-en'},entregue:{l:'Entregue',c:'s-ok'},retirado:{l:'Retirado',c:'s-ok'}};
  const SQ=['aguardando_pagamento','pagamento_confirmado','em_separacao','saiu_entrega','entregue'];
  const SQR=['aguardando_pagamento','pagamento_confirmado','em_separacao','pronto_retirada','retirado'];
  const nextSt=p=>{const s=p.tipoEntrega==='retirada'?SQR:SQ;const i=s.indexOf(p.status);return i<s.length-1?s[i+1]:null;};
  const tabs=[['dashboard','📊 Dashboard'],['pedidos','📦 Pedidos'],['produtos','🛒 Produtos'],['promocoes','🔥 Promoções']];
  const hoje=new Date().toLocaleDateString('pt-BR');
  const ph=pedidos.filter(p=>new Date(p.data).toLocaleDateString('pt-BR')===hoje);
  const fat=ph.reduce((a,p)=>a+p.subtotal+p.frete,0);
  const em=pedidos.filter(p=>!['entregue','retirado'].includes(p.status));
  const prAt=produtos.filter(p=>p.ativo&&p.estoque>0).length;
  const prPr=produtos.filter(p=>p.promo&&p.ativo).length;

  let content='';
  if(adminAba==='dashboard'){
    content=`
      <div class="stats">
        <div class="stat"><div class="stat-l">Pedidos hoje</div><div class="stat-v">${ph.length}</div><div class="stat-s">${pedidos.length} no total</div></div>
        <div class="stat"><div class="stat-l">Faturamento hoje</div><div class="stat-v">${R(fat)}</div><div class="stat-s">Pedidos do dia</div></div>
        <div class="stat"><div class="stat-l">Em aberto</div><div class="stat-v">${em.length}</div><div class="stat-s">Aguardando ação</div></div>
        <div class="stat"><div class="stat-l">Produtos ativos</div><div class="stat-v">${prAt}</div><div class="stat-s">${prPr} em promoção</div></div>
      </div>
      <div class="table-card">
        <div class="table-hdr"><h3>Pedidos recentes</h3></div>
        ${pedidos.length===0?`<div style="padding:24px;text-align:center;color:var(--gray400);">Nenhum pedido ainda. Faça uma compra no site!</div>`:`
        <div style="overflow-x:auto;"><table>
          <thead><tr><th>Pedido</th><th>Total</th><th>Entrega</th><th>Status</th><th>Avançar</th></tr></thead>
          <tbody>${pedidos.slice(0,8).map(p=>{const st=ST[p.status]||{l:p.status,c:'s-ag'};const n=nextSt(p);return`
            <tr><td style="font-weight:700;">${p.id}</td>
            <td style="font-weight:700;color:var(--g);">${R(p.subtotal+p.frete)}</td>
            <td>${p.tipoEntrega==='retirada'?'🏪':'🚚'} ${p.usuario}</td>
            <td><span class="status-badge ${st.c}">${st.l}</span></td>
            <td>${n?`<button class="btn-sm bsm-adv" onclick="avancarPedido('${p.id}')">→ ${ST[n].l}</button>`:`<span style="font-size:11px;color:var(--gray400);">✓</span>`}</td></tr>`;
          }).join('')}</tbody>
        </table></div>`}
      </div>`;
  }
  else if(adminAba==='pedidos'){
    content=`<div class="table-card"><div style="overflow-x:auto;">
      ${pedidos.length===0?`<div style="padding:24px;text-align:center;color:var(--gray400);">Nenhum pedido ainda.</div>`:`
      <table>
        <thead><tr><th>Pedido</th><th>Data</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Entrega</th><th>Pagamento</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody>${pedidos.map(p=>{const st=ST[p.status]||{l:p.status,c:'s-ag'};const n=nextSt(p);const dt=new Date(p.data).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});const hp=p.itens.some(i=>i.peso);return`
          <tr><td style="font-weight:700;">${p.id}</td>
          <td style="font-size:12px;">${dt}</td>
          <td>${p.usuario}</td>
          <td>${p.itens.reduce((a,i)=>a+i.qtd,0)} itens${hp?' ⚖️':''}</td>
          <td style="font-weight:700;color:var(--g);">${R(p.subtotal+p.frete)}</td>
          <td>${p.tipoEntrega==='retirada'?'🏪 Retirada':'🚚 Entrega'}</td>
          <td>${{pix:'💠 PIX',credito:'💳 Crédito',debito:'💳 Débito'}[p.tipoPag]||'—'}</td>
          <td><span class="status-badge ${st.c}">${st.l}</span></td>
          <td>${n?`<button class="btn-sm bsm-adv" onclick="avancarPedido('${p.id}')">→ ${ST[n].l}</button>`:`<span style="font-size:11px;color:var(--gray400);">✓</span>`}</td></tr>`;
        }).join('')}</tbody>
      </table>`}
    </div></div>`;
  }
  else if(adminAba==='produtos'){
    content=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap;">
        <input type="text" id="fprod" placeholder="🔍 Buscar produto..." style="border:1.5px solid var(--gray200);border-radius:var(--r8);padding:7px 12px;font-size:13px;outline:none;flex:1;min-width:180px;" oninput="render()">
        <button onclick="abrirModalProd(null)" style="background:var(--g);color:white;border:none;border-radius:var(--r8);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">+ Novo produto</button>
      </div>
      <div class="table-card"><div style="overflow-x:auto;"><table>
        <thead><tr><th>Produto</th><th>Cat.</th><th>Preço</th><th>Estoque</th><th>Promo</th><th>Ativo</th><th>Ações</th></tr></thead>
        <tbody>${(()=>{
          const busca=(document.getElementById('fprod')?.value||'').toLowerCase();
          return produtos.filter(p=>!busca||p.nome.toLowerCase().includes(busca)||p.marca.toLowerCase().includes(busca)).map(p=>`
          <tr>
            <td><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:22px;">${p.e}</span><div><div style="font-weight:600;font-size:13px;">${p.nome}</div><div style="font-size:11px;color:var(--gray400);">${p.marca}</div></div></div></td>
            <td><span style="font-size:11px;background:var(--gray100);padding:2px 7px;border-radius:999px;">${p.cat}</span></td>
            <td style="font-weight:600;color:var(--g);">${p.peso?'⚖️ Peso':(p.preco?R(p.preco):'—')}</td>
            <td><input type="number" class="estoque-inp" value="${p.estoque}" min="0" onchange="produtos.find(x=>x.id==${p.id}).estoque=parseInt(this.value)||0;salvar();"></td>
            <td>${p.promo?`<span style="background:#FFEDED;color:var(--red);font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;">🔥 ${DESC(p.orig,p.preco)}%</span>`:'—'}</td>
            <td><label class="tgl"><input type="checkbox" ${p.ativo?'checked':''} onchange="produtos.find(x=>x.id==${p.id}).ativo=this.checked;salvar();render()"><span class="tsldr"></span></label></td>
            <td><div style="display:flex;gap:5px;">
              <button class="btn-sm bsm-edit" onclick="abrirModalProd(${p.id})">Editar</button>
              <button class="btn-sm bsm-del" onclick="if(confirm('Excluir ${p.nome}?')){produtos=produtos.filter(x=>x.id!=${p.id});salvar();render();}">Excluir</button>
            </div></td>
          </tr>`).join('');
        })()}</tbody>
      </table></div></div>`;
  }
  else if(adminAba==='promocoes'){
    const promos=produtos.filter(p=>p.promo&&p.ativo);
    content=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;">
      <div>
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Em promoção agora</h3>
        ${promos.length===0?`<div style="background:white;border-radius:var(--r12);padding:20px;text-align:center;color:var(--gray400);">Nenhuma promoção ativa</div>`
        :promos.map(p=>`<div class="promo-card-admin">
          <span style="font-size:30px;">${p.e}</span>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;">${p.nome}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
              <span style="text-decoration:line-through;color:var(--gray400);font-size:12px;">${R(p.orig)}</span>
              <span style="font-weight:800;color:var(--g);font-size:15px;">${R(p.preco)}</span>
              <span style="background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;">-${DESC(p.orig,p.preco)}%</span>
            </div>
          </div>
          <button class="btn-sm bsm-del" onclick="const x=produtos.find(q=>q.id==${p.id});x.promo=false;x.orig=null;salvar();render();">Remover</button>
        </div>`).join('')}
      </div>
      <div style="background:white;border-radius:var(--r12);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">Adicionar promoção</h3>
        <div class="form-grp"><label>Produto</label>
          <select id="pp-sel" style="width:100%;border:1.5px solid var(--gray200);border-radius:var(--r8);padding:9px;font-size:13px;outline:none;background:white;">
            <option value="">Selecione o produto...</option>
            ${produtos.filter(p=>p.ativo&&!p.peso).map(p=>`<option value="${p.id}">${p.e} ${p.nome} (${p.marca}) — ${R(p.preco)}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <div class="form-grp"><label>Preço original (De)</label><input type="number" id="pp-orig" placeholder="R$ 0,00" step="0.01"></div>
          <div class="form-grp"><label>Preço promo (Por)</label><input type="number" id="pp-novo" placeholder="R$ 0,00" step="0.01" oninput="calcDescPreview()"></div>
        </div>
        <div id="desc-preview" style="display:none;background:var(--gp);border-radius:var(--r8);padding:10px;text-align:center;font-size:13px;font-weight:700;color:var(--g);margin-bottom:12px;"></div>
        <button class="btn-prim" onclick="ativarPromo()">🔥 Ativar promoção</button>
      </div>
    </div>`;
  }

  return`
    <div class="admin-wrap">
      <div class="admin-topbar">
        <span style="font-size:18px;">⚙️</span>
        <h1>Admin – Mercado Alves</h1>
        <button onclick="pagina='site';render()" style="margin-left:auto;background:var(--y);color:#1a1a1a;border:none;border-radius:var(--r8);padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;">← Ver site</button>
      </div>
      <div class="admin-tabs">
        ${tabs.map(([k,l])=>`<div class="atab ${adminAba===k?'active':''}" onclick="adminAba='${k}';render()">${l}</div>`).join('')}
      </div>
      <div class="admin-body">${content}</div>
    </div>`;
}

function avancarPedido(id){
  const p=pedidos.find(x=>x.id===id); if(!p)return;
  const SQ=['aguardando_pagamento','pagamento_confirmado','em_separacao','saiu_entrega','entregue'];
  const SQR=['aguardando_pagamento','pagamento_confirmado','em_separacao','pronto_retirada','retirado'];
  const s=p.tipoEntrega==='retirada'?SQR:SQ;
  const i=s.indexOf(p.status);
  if(i<s.length-1){p.status=s[i+1];salvar();toast('✅ Status atualizado!');render();}
}

function calcDescPreview(){
  const o=parseFloat(document.getElementById('pp-orig')?.value);
  const n=parseFloat(document.getElementById('pp-novo')?.value);
  const el=document.getElementById('desc-preview');
  if(el&&o&&n&&n<o){el.style.display='block';el.textContent=`🎉 Desconto de ${DESC(o,n)}% — economia de ${R(o-n)} por unidade`;}
  else if(el) el.style.display='none';
}

function ativarPromo(){
  const id=parseInt(document.getElementById('pp-sel')?.value);
  const o=parseFloat(document.getElementById('pp-orig')?.value);
  const n=parseFloat(document.getElementById('pp-novo')?.value);
  if(!id){toast('Selecione um produto');return;}
  if(!o||!n){toast('Preencha os preços');return;}
  if(n>=o){toast('Preço promo deve ser menor que o original');return;}
  const p=produtos.find(x=>x.id===id);
  if(!p)return;
  p.promo=true;p.orig=o;p.preco=n;salvar();toast('🔥 Promoção ativada!');render();
}

function abrirModalProd(id){
  const p=id?produtos.find(x=>x.id===id):null;
  abrirModal(`
    <div class="modal-hdr"><h3>${p?'Editar':'Novo'} produto</h3><button onclick="fecharModal()" class="modal-close">✕</button></div>
    <div class="form-row">
      <div class="form-grp"><label>Nome *</label><input id="pf-nome" value="${p?.nome||''}"></div>
      <div class="form-grp"><label>Marca *</label><input id="pf-marca" value="${p?.marca||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-grp"><label>Emoji</label><input id="pf-emoji" value="${p?.e||'📦'}" maxlength="4"></div>
      <div class="form-grp"><label>Unidade</label><input id="pf-un" value="${p?.un||'un'}"></div>
    </div>
    <div class="form-row">
      <div class="form-grp"><label>Categoria</label>
        <select id="pf-cat" style="width:100%;border:1.5px solid var(--gray200);border-radius:var(--r8);padding:9px;font-size:13px;outline:none;background:white;">
          ${['hortifruti','carnes','laticinios','bebidas','limpeza','higiene','mercearia','padaria'].map(c=>`<option ${p?.cat===c?'selected':''} value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-grp"><label>Preço (R$)</label><input type="number" id="pf-preco" step="0.01" value="${p?.preco||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-grp"><label>Estoque</label><input type="number" id="pf-est" value="${p?.estoque||0}"></div>
      <div class="form-grp"><label>Tags (vírgula)</label><input id="pf-tags" value="${p?.tags?.join(', ')||''}"></div>
    </div>
    <div style="display:flex;gap:20px;margin:10px 0 16px;font-size:13px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="pf-peso" ${p?.peso?'checked':''}> Por peso (carne etc.)</label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="pf-ativo" ${p===null||p?.ativo?'checked':''}> Ativo</label>
    </div>
    <button class="btn-prim" onclick="salvarProd(${id||'null'})">Salvar produto</button>
  `);
}

function salvarProd(id){
  const nome=document.getElementById('pf-nome')?.value.trim();
  const marca=document.getElementById('pf-marca')?.value.trim();
  if(!nome||!marca){toast('Preencha nome e marca');return;}
  const d={nome,marca,cat:document.getElementById('pf-cat')?.value,e:document.getElementById('pf-emoji')?.value||'📦',un:document.getElementById('pf-un')?.value||'un',preco:parseFloat(document.getElementById('pf-preco')?.value)||null,estoque:parseInt(document.getElementById('pf-est')?.value)||0,tags:document.getElementById('pf-tags')?.value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean),peso:document.getElementById('pf-peso')?.checked,ativo:document.getElementById('pf-ativo')?.checked,promo:false,orig:null};
  if(id){const i=produtos.findIndex(x=>x.id===id);if(i>=0)produtos[i]={...produtos[i],...d};toast('✅ Produto atualizado!');}
  else{produtos.push({id:Math.max(...produtos.map(p=>p.id),0)+1,...d});toast('✅ Produto adicionado!');}
  salvar();fecharModal();render();
}

// ============================================================
// RENDER PRINCIPAL
// ============================================================
function render(){
  let html='';
  if(pagina==='admin')      html=htmlAdmin();
  else if(pagina==='login') html=htmlLogin();
  else if(pagina==='cadastro') html=htmlCadastro();
  else if(pagina==='conta') html=htmlConta();
  else if(pagina==='meus-pedidos') html=htmlMeusPedidos();
  else                      html=htmlSite();
  document.getElementById('app').innerHTML=html;

  // Atualizar contador bottom nav / header
  const cn=qtdTotal();
  ['cartCount'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=cn;});
}

// INIT
render();
renderCarrinho();
</script>
</body>
</html>
