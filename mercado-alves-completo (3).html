<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Alves – Compre de Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* paleta — verde-floresta profundo + dourado-âmbar + creme quente */
  --forest-950:#0B2218;
  --forest-900:#0F2E1F;
  --forest-800:#16402C;
  --forest-700:#1F5C3F;
  --forest-600:#2A7350;
  --forest-100:#E3EEE5;
  --forest-200:#CFE3D2;
  --forest-300:#A9CCB0;
  --forest-50:#F2F7F1;
  --gold-700:#A87A1E;
  --gold-600:#C9962B;
  --gold-500:#DCAE49;
  --gold-100:#FBF1DC;
  --terracotta:#B5482E;
  --terracotta-100:#FBE9E3;
  --cream:#FAF7F0;
  --cream-100:#FFFFFF;
  --paper:#F4F0E6;
  --ink:#1A1D1B;
  --ink-soft:#4A4F49;
  --ink-faint:#8B9089;
  --line:#E5E0D2;
  --line-soft:#EFEBDF;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-pill:999px;
  --shadow-sm:0 1px 2px rgba(15,46,31,.06),0 1px 1px rgba(15,46,31,.04);
  --shadow-md:0 4px 14px rgba(15,46,31,.08),0 1px 3px rgba(15,46,31,.06);
  --shadow-lg:0 18px 45px -10px rgba(15,46,31,.22),0 6px 16px -4px rgba(15,46,31,.1);
  --shadow-gold:0 10px 28px -6px rgba(201,150,43,.4);
  --ease:cubic-bezier(.22,1,.36,1);
  --header-cor:#0B2218;
}
html{scroll-behavior:smooth;}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
  *{animation-duration:.001ms!important;transition-duration:.001ms!important;}
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:76px;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;border:none;}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{outline:2px solid var(--gold-600);outline-offset:2px;}
::selection{background:var(--gold-100);}
h1,h2,h3{font-family:'Fraunces',serif;letter-spacing:-.01em;}

/* ---------- VARIANT SELECTOR ---------- */
.var-selector{margin-top:8px;}
.var-selector-label{font-size:11px;color:var(--ink-faint);font-weight:500;margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase;}
.var-opcoes{display:flex;flex-wrap:wrap;gap:5px;}
.var-opt{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:var(--r-pill);border:1.5px solid var(--line);background:white;color:var(--ink-soft);cursor:pointer;transition:all .15s var(--ease);white-space:nowrap;line-height:1.3;}
.var-opt:hover{border-color:var(--forest-600);color:var(--forest-700);}
.var-opt.selected{background:var(--forest-700);color:white;border-color:var(--forest-700);}
.var-preco-row{margin-top:9px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.var-preco-val{font-size:18px;font-weight:800;color:var(--forest-800);font-family:'Fraunces',serif;}
.var-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--forest-700);background:var(--forest-50);border:1px solid var(--forest-200);border-radius:var(--r-pill);padding:3px 8px;margin-bottom:4px;}

/* ---------- WEIGHT SELECTOR ---------- */
.peso-selector{margin-top:10px;}
.peso-select-wrap{position:relative;display:flex;align-items:center;gap:8px;}
.peso-select{appearance:none;-webkit-appearance:none;width:100%;border:1.5px solid var(--line);border-radius:var(--r-md);padding:9px 36px 9px 12px;font-size:13px;font-weight:600;color:var(--ink);background:var(--cream);cursor:pointer;outline:none;transition:border-color .15s;font-family:inherit;}
.peso-select:hover{border-color:var(--forest-500);}
.peso-select:focus{border-color:var(--forest-700);background:white;}
.peso-select-arrow{position:absolute;right:10px;pointer-events:none;color:var(--ink-faint);}
.peso-preco-calc{margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.peso-preco-val{font-size:18px;font-weight:800;color:var(--forest-800);font-family:'Fraunces',serif;}
.peso-preco-kg{font-size:11px;color:var(--ink-faint);}
.peso-hint{font-size:11px;color:var(--ink-faint);margin-top:6px;display:flex;align-items:center;gap:5px;}

/* ---------- ICONS (inline SVG, stroke-based, replaces emoji) ---------- */
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic svg{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* ---------- HEADER ---------- */
.header{background:linear-gradient(180deg,var(--header-cor),color-mix(in srgb,var(--header-cor) 85%,#000));position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px -8px rgba(0,0,0,.35);}
.header-inner{display:flex;flex-direction:column;gap:12px;padding:14px 20px;max-width:1280px;margin:0 auto;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0;width:100%;}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0;}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,var(--gold-500),var(--gold-700));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-gold);flex-shrink:0;}
.logo-mark .ic{color:var(--forest-950);font-size:19px;}
.logo-name{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-.01em;white-space:nowrap;}
.logo-sub{font-size:10.5px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;white-space:nowrap;}
.search-wrap{flex:1;position:relative;max-width:560px;min-width:0;}
.search-wrap input{width:100%;border:1px solid transparent;outline:none;background:rgba(255,255,255,.95);border-radius:var(--r-pill);padding:11px 18px 11px 42px;font-size:14px;color:var(--ink);transition:box-shadow .2s var(--ease),background .2s;}
.search-wrap input:focus{background:#fff;box-shadow:0 0 0 3px rgba(201,150,43,.35);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px;pointer-events:none;}
.search-dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border-radius:var(--r-md);box-shadow:var(--shadow-lg);z-index:200;display:none;max-height:320px;overflow-y:auto;border:1px solid var(--line-soft);}
.search-dropdown.open{display:block;}
.sd-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .12s;}
.sd-item:hover{background:var(--forest-50);}
.sd-icn{width:38px;height:38px;border-radius:var(--r-sm);background:var(--forest-50);display:flex;align-items:center;justify-content:center;color:var(--forest-700);font-size:16px;flex-shrink:0;}
.sd-name{font-size:13px;font-weight:600;}
.sd-price{font-size:12px;color:var(--forest-700);font-weight:600;}
.sd-label{padding:7px 16px;font-size:11px;color:var(--ink-faint);background:var(--forest-50);border-top:1px solid var(--line-soft);letter-spacing:.03em;}
.header-btns{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-auth{display:flex;align-items:center;gap:7px;color:#fff;font-size:13px;font-weight:500;padding:9px 14px;border-radius:var(--r-pill);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:background .2s,border-color .2s;white-space:nowrap;}
.btn-auth:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);}
.cart-btn{background:linear-gradient(145deg,var(--gold-500),var(--gold-700));border:none;border-radius:var(--r-pill);padding:10px 16px;color:var(--forest-950);position:relative;cursor:pointer;transition:transform .2s var(--ease),box-shadow .2s;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;box-shadow:var(--shadow-gold);}
.cart-btn:hover{transform:translateY(-1px);box-shadow:0 14px 32px -6px rgba(201,150,43,.5);}
.cart-count{background:var(--forest-950);color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.cat-nav{display:flex;gap:6px;padding:10px 20px 14px;overflow-x:auto;scrollbar-width:none;max-width:1280px;margin:0 auto;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-size:12.5px;font-weight:500;padding:7px 16px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap;transition:all .2s var(--ease);display:flex;align-items:center;gap:6px;}
.cat-btn .ic{font-size:14px;}
.cat-btn.active{background:linear-gradient(145deg,var(--gold-500),var(--gold-700));color:var(--forest-950);border-color:transparent;font-weight:700;}
.cat-btn:hover:not(.active){background:rgba(255,255,255,.12);color:#fff;}

/* ---------- HERO BANNER CAROUSEL ---------- */
.hero-carousel{position:relative;overflow:hidden;background:var(--forest-950);width:100%;}
.hero-track{display:flex;transition:transform .6s cubic-bezier(.22,1,.36,1);will-change:transform;}
.hero-slide{flex-shrink:0;width:100%;position:relative;min-height:clamp(260px,40vw,480px);display:flex;align-items:flex-end;}
.hero-slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 8s ease;}
.hero-slide-bg.zoomed{transform:scale(1.06);}
/* overlay gradiente sobre a imagem/vídeo */
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(11,34,24,.82) 0%,rgba(11,34,24,.35) 50%,rgba(11,34,24,.1) 100%);z-index:1;}
.hero-slide video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-content{position:relative;z-index:2;padding:clamp(20px,4vw,48px) clamp(20px,5vw,64px) clamp(28px,5vw,56px);max-width:680px;}
.hero-eye{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--gold-500);margin-bottom:14px;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border:1px solid rgba(220,174,73,.35);border-radius:var(--r-pill);background:rgba(220,174,73,.1);}
.hero-content h1{font-size:clamp(26px,4.5vw,52px);font-weight:600;line-height:1.1;margin-bottom:14px;font-family:'Fraunces',serif;color:#fff;}
.hero-content h1 em{font-style:italic;color:var(--gold-500);font-weight:500;}
.hero-content p{font-size:clamp(13px,2vw,15.5px);color:rgba(255,255,255,.72);line-height:1.65;margin-bottom:24px;max-width:440px;}
.hero-content p strong{color:var(--gold-500);}
.btn-hero{background:linear-gradient(145deg,var(--gold-500),var(--gold-700));color:var(--forest-950);border:none;font-size:14.5px;font-weight:700;padding:14px 28px;border-radius:var(--r-pill);cursor:pointer;box-shadow:var(--shadow-gold);transition:transform .25s var(--ease),box-shadow .25s;display:inline-flex;align-items:center;gap:9px;}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 16px 36px -6px rgba(201,150,43,.55);}
.hero-badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;}
.hero-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-md);padding:9px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,.85);}
.hero-badge .ic{color:var(--gold-500);font-size:14px;}
/* dots */
.hero-dots{position:absolute;bottom:16px;right:20px;z-index:3;display:flex;gap:7px;align-items:center;}
.hero-dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.35);border:none;cursor:pointer;transition:all .3s var(--ease);padding:0;}
.hero-dot.active{width:24px;background:var(--gold-500);}
/* nav arrows */
.hero-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .2s;backdrop-filter:blur(4px);}
.hero-nav:hover{background:rgba(0,0,0,.55);}
.hero-nav.prev{left:12px;}
.hero-nav.next{right:12px;}

/* ---------- SECTIONS ---------- */
.section{padding:36px 20px;max-width:1280px;margin:0 auto;}
.sec-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;gap:12px;}
.sec-hdr h2{font-size:22px;font-weight:600;color:var(--forest-900);display:flex;align-items:center;gap:10px;}
.sec-hdr h2 .ic{color:var(--gold-600);font-size:20px;}
.sec-eyebrow{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-700);margin-bottom:6px;}
.btn-ver{background:none;border:1px solid var(--line);color:var(--forest-700);font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:var(--r-pill);cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-ver:hover{background:var(--forest-50);border-color:var(--forest-200);}

/* ---------- GRIDS ---------- */
.promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px;}

/* ---------- PROMO SLIDER ---------- */
.promo-section{background:linear-gradient(180deg,var(--forest-50) 0%,var(--cream) 100%);border-bottom:1px solid var(--line-soft);}
.promo-section-inner{max-width:1280px;margin:0 auto;padding:28px 20px 32px;}
.promo-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.promo-sec-hdr h2{font-size:22px;font-weight:600;color:var(--forest-900);display:flex;align-items:center;gap:10px;}
.promo-slider-wrap{position:relative;padding:0 0 4px;}
.promo-slider-track-outer{overflow:hidden;}
.promo-slider-track{display:flex;gap:16px;transition:transform .45s cubic-bezier(.22,1,.36,1);will-change:transform;}
.promo-slider-track .card{flex-shrink:0;width:clamp(190px,44vw,240px);}
.promo-nav{position:absolute;top:42%;transform:translateY(-50%);z-index:2;background:#fff;border:1px solid var(--line);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--forest-800);box-shadow:var(--shadow-md);transition:background .15s;}
.promo-nav:hover{background:var(--forest-50);}
.promo-nav.prev{left:-14px;}
.promo-nav.next{right:-14px;}
@media(max-width:480px){.promo-nav{display:none;}}

/* ---------- CARD ---------- */
.card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .3s var(--ease),box-shadow .3s var(--ease);position:relative;border:1px solid var(--line-soft);}
.card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
.card-img{width:100%;aspect-ratio:1;background:linear-gradient(155deg,var(--forest-50),var(--paper));display:flex;align-items:center;justify-content:center;color:var(--forest-700);position:relative;overflow:hidden;}
.card-img .ic{font-size:40px;opacity:.85;}
.card-img::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.5),transparent 60%);}
.promo-ribbon{position:absolute;top:12px;left:0;background:var(--terracotta);color:#fff;font-size:11px;font-weight:700;padding:4px 11px 4px 13px;border-radius:0 var(--r-pill) var(--r-pill) 0;box-shadow:0 2px 6px rgba(181,72,46,.35);letter-spacing:.02em;z-index:2;}
.peso-badge{position:absolute;top:10px;right:10px;background:var(--forest-900);color:#fff;font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:4px;z-index:2;}
.card-body{padding:13px 14px 14px;}
.card-brand{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:600;}
.card-name{font-size:13px;font-weight:600;line-height:1.35;min-height:34px;margin-bottom:5px;color:var(--ink);}
.card-unit{font-size:10.5px;color:var(--ink-faint);margin-bottom:8px;}
.price-row{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:11px;}
.price-orig{font-size:11.5px;color:var(--ink-faint);text-decoration:line-through;font-variant-numeric:tabular-nums;}
.price-now{font-size:17px;font-weight:800;color:var(--forest-800);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.price-peso{font-size:11px;color:var(--ink-soft);font-style:italic;}
.promo-badge{display:inline-flex;align-items:center;background:var(--terracotta-100);color:var(--terracotta);font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:7px;}
.btn-add{width:100%;background:var(--forest-900);color:#fff;border:none;border-radius:var(--r-md);padding:9px;font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background .2s,transform .15s;}
.btn-add:hover{background:var(--forest-700);}
.btn-add:active{transform:scale(.97);}
.qty-ctrl{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--forest-50);border-radius:var(--r-md);border:1px solid var(--forest-100);}
.qty-btn{background:none;border:none;width:34px;height:34px;font-size:17px;color:var(--forest-800);font-weight:700;cursor:pointer;transition:color .15s;}
.qty-btn:hover{color:var(--gold-700);}
.qty-n{font-size:14px;font-weight:700;color:var(--forest-900);font-variant-numeric:tabular-nums;}

/* ---------- COMBINA COM (sugestões discretas) ---------- */
.combina-box{background:var(--forest-50);border:1px solid var(--forest-100);border-radius:var(--r-lg);padding:16px 0 18px;}
.combina-hdr{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--forest-700);text-transform:uppercase;letter-spacing:.04em;padding:0 18px 12px;}
.combina-hdr .ic{color:var(--gold-600);}
.combina-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 18px 2px;scrollbar-width:none;}
.combina-scroll::-webkit-scrollbar{display:none;}
.combina-card{flex-shrink:0;width:128px;background:#fff;border-radius:var(--r-md);border:1px solid var(--line-soft);padding:10px;transition:transform .2s var(--ease),box-shadow .2s;}
.combina-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm);}
.combina-card-img{width:100%;aspect-ratio:1;border-radius:var(--r-sm);background:linear-gradient(155deg,var(--forest-50),var(--paper));display:flex;align-items:center;justify-content:center;color:var(--forest-700);font-size:24px;margin-bottom:8px;}
.combina-card-name{font-size:11.5px;font-weight:600;line-height:1.3;min-height:28px;color:var(--ink);}
.combina-card-marca{font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;margin:2px 0 8px;}
.combina-card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.combina-card-price{font-size:12px;font-weight:700;color:var(--forest-800);font-variant-numeric:tabular-nums;}
.combina-add{background:var(--forest-900);color:#fff;border:none;border-radius:999px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0;}
.combina-add:hover{background:var(--forest-700);}
.combina-add.added{width:auto;padding:0 8px;gap:3px;background:var(--gold-600);color:var(--forest-950);font-size:10.5px;font-weight:700;}
.combina-cart-box{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);}

/* ---------- EMPTY ---------- */
.empty{text-align:center;padding:56px 20px;}
.empty .ic{font-size:46px;color:var(--ink-faint);margin-bottom:16px;}
.empty h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--forest-900);}
.empty p{font-size:14px;color:var(--ink-soft);}

/* ---------- CART SIDEBAR ---------- */
.overlay{position:fixed;inset:0;background:rgba(11,34,24,.55);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px);}
.overlay.open{opacity:1;pointer-events:all;}
.cart-sidebar{position:fixed;top:0;right:0;height:100%;width:min(420px,100vw);background:var(--cream);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s var(--ease);box-shadow:-8px 0 36px rgba(15,46,31,.18);}
.cart-sidebar.open{transform:translateX(0);}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 16px;border-bottom:1px solid var(--line);background:#fff;}

const subTotal  = () => carrinho.reduce((a,i)=>a+(!i.preco?0:i.preco*i.qtd),0);
const qtdTotal  = () => carrinho.reduce((a,i)=>a+i.qtd,0);

  return CONFIG.freteMinimo||8.90;
};

// Calcula frete por distância real via OpenRouteService
// Retorna Promise<{km, valor, erro}>
async function calcFreteDistancia(enderecoDestino){
  const s=subTotal();
  if(CONFIG.freteGratisAcima && s>=CONFIG.freteGratisAcima) return {km:0,valor:0,gratis:true};
  if(!CONFIG.orsApiKey) return {km:null,valor:CONFIG.freteMinimo||8.90,semChave:true};
  if(!CONFIG.mercadoLat||!CONFIG.mercadoLng) return {km:null,valor:CONFIG.freteMinimo||8.90,semGeo:true};

  // Geocodifica o endereço do cliente via ORS
  const endStr=`${enderecoDestino.rua||''} ${enderecoDestino.numero||''}, ${enderecoDestino.cidade||'Ibitirama'}, ${enderecoDestino.estado||'ES'}, Brasil`;
  try{
    const geoRes=await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${CONFIG.orsApiKey}&text=${encodeURIComponent(endStr)}&boundary.country=BR&size=1`);
    const geoData=await geoRes.json();
    const feat=geoData.features?.[0];
    if(!feat) return {km:null,valor:CONFIG.freteMinimo||8.90,erroGeo:true};
    const [lng,lat]=feat.geometry.coordinates;

    // Calcula rota via ORS (carro)
    const rotaRes=await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${CONFIG.orsApiKey}&start=${CONFIG.mercadoLng},${CONFIG.mercadoLat}&end=${lng},${lat}`);
    const rotaData=await rotaRes.json();
    const distM=rotaData.features?.[0]?.properties?.segments?.[0]?.distance;
    if(!distM) return {km:null,valor:CONFIG.freteMinimo||8.90,erroRota:true};

    const km=distM/1000;
    // Aplica faixas de frete
    const faixas=(CONFIG.faixasFrete||[]).slice().sort((a,b)=>a.ate-b.ate);
    let valor=0, kmRestante=km, kmAcum=0;
    for(let i=0;i<faixas.length;i++){
      const f=faixas[i];
      const faixaInicio=i===0?0:faixas[i-1].ate;
      if(kmAcum>=km) break;
      const kmNaFaixa=Math.min(f.ate,km)-kmAcum;
      if(kmNaFaixa<=0) continue;
      valor+=kmNaFaixa*f.valorPorKm;
      kmAcum+=kmNaFaixa;
    }
    valor=Math.max(valor, CONFIG.freteMinimo||0);
    return {km:parseFloat(km.toFixed(1)), valor:parseFloat(valor.toFixed(2))};
  }catch(e){
    return {km:null,valor:CONFIG.freteMinimo||8.90,erro:e.message};
  }
}

// Geocodifica o endereço do mercado e salva lat/lng no CONFIG
async function geocodificarMercado(){
  if(!CONFIG.orsApiKey) return false;
  const endStr=`${CONFIG.mercadoRua} ${CONFIG.mercadoNumero}, ${CONFIG.mercadoCidade}, ${CONFIG.mercadoEstado}, Brasil`;
  try{
    const res=await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${CONFIG.orsApiKey}&text=${encodeURIComponent(endStr)}&boundary.country=BR&size=1`);
    const data=await res.json();
    const feat=data.features?.[0];
    if(!feat) return false;
    [CONFIG.mercadoLng,CONFIG.mercadoLat]=feat.geometry.coordinates;
    salvar();
    return true;
  }catch(e){ return false; }
}

function adicionarAoCarrinho(id, gramas, varIdx){
  const p=produtos.find(x=>x.id===id); if(!p)return;
  if(p.peso){
    if(!gramas){ abrirModalPeso(id); return; }
    const pesoKg=gramas/1000;
    const precoCalc=p.precoPorKg?parseFloat((p.precoPorKg*pesoKg).toFixed(2)):null;
    const chave=id+'_g'+gramas;
    const ex=carrinho.find(i=>i.chave===chave);
    if(ex) ex.qtd++;
    else carrinho.push({id:p.id,chave,nome:p.nome,cat:p.cat,preco:precoCalc,peso:true,gramas,precoPorKg:p.precoPorKg,qtd:1});
    salvar(); renderCarrinho(); render(); toast(ic('check-circle')+p.nome+' '+formatGramas(gramas)+' adicionado');
    return;
  }
  if(p.variantes&&p.variantes.length>0){
    if(varIdx===undefined||varIdx===null){ abrirModalVariante(id); return; }
    const v=p.variantes[varIdx];
    if(!v)return;
    const chave=id+'_v'+varIdx;
    const ex=carrinho.find(i=>i.chave===chave);
    if(ex) ex.qtd++;
    else carrinho.push({id:p.id,chave,nome:p.nome,cat:p.cat,preco:v.preco,varLabel:v.label,varIdx,qtd:1});
    salvar(); renderCarrinho(); render(); toast(ic('check-circle')+p.nome+' '+v.label+' adicionado');
    return;
  }
  const ex=carrinho.find(i=>i.id===id&&!i.chave);
  if(ex) ex.qtd++;
  else carrinho.push({id:p.id,nome:p.nome,cat:p.cat,preco:p.preco,peso:p.peso,qtd:1});
  salvar(); renderCarrinho(); render(); toast(ic('check-circle')+p.nome+' adicionado');
}

function removerDoCarrinho(id, chave){
  if(chave){
    const i=carrinho.findIndex(x=>x.chave===chave); if(i<0)return;
    if(carrinho[i].qtd>1) carrinho[i].qtd--;
    else carrinho.splice(i,1);
  } else {
    const i=carrinho.findIndex(x=>x.id===id&&!x.chave); if(i<0)return;
    if(carrinho[i].qtd>1) carrinho[i].qtd--;
    else carrinho.splice(i,1);
  }
  salvar(); renderCarrinho(); render();
}

function formatGramas(g){
  if(g>=1000&&g%1000===0) return (g/1000)+'kg';
  if(g>=1000) return (g/1000).toFixed(1).replace('.',',')+'kg';
  return g+'g';
}

function precoPesoCalc(precoPorKg, gramas){
  return parseFloat((precoPorKg*(gramas/1000)).toFixed(2));
}

function irPasso(n){ckStep=n;renderCheckout();}

async function salvarEnderecoEIr(){
  const cep=document.getElementById('ck-cep')?.value;
  const num=document.getElementById('ck-num')?.value;
  if(!cep||!num){toast('Informe o CEP e número');return;}
  ckEndereco={
    cep,numero:num,
    rua:document.getElementById('ck-rua')?.value||'',
    bairro:document.getElementById('ck-bairro')?.value||'',
    cidade:document.getElementById('ck-cidade')?.value||'Ibitirama',
    complemento:document.getElementById('ck-comp')?.value||''
  };

  // Calcula frete por distância se ORS configurado
  if(CONFIG.orsApiKey && CONFIG.mercadoLat){
    const btn=document.querySelector('[onclick="salvarEnderecoEIr()"]');
    if(btn){btn.disabled=true;btn.innerHTML=ic('clock')+' Calculando frete...';}
    const resultado=await calcFreteDistancia(ckEndereco);
    ckFreteCalculado=resultado;
    if(btn){btn.disabled=false;btn.innerHTML='Continuar '+ic('arrow-right');}
    if(resultado.erro||resultado.erroGeo){
      toast(ic('alert')+' Não conseguimos calcular o frete automaticamente. Um valor estimado será usado.');
    }
  } else {
    ckFreteCalculado=null;
  }
  irPasso(3);
}

function preencherEndSalvo(){
  const end=usuario?.endereco||{};
  if(document.getElementById('ck-cep'))document.getElementById('ck-cep').value=end.cep||'';
  if(document.getElementById('ck-num'))document.getElementById('ck-num').value=end.numero||'';
  if(document.getElementById('ck-rua'))document.getElementById('ck-rua').value=end.rua||'';
  if(document.getElementById('ck-bairro'))document.getElementById('ck-bairro').value=end.bairro||'';
  if(document.getElementById('ck-cidade'))document.getElementById('ck-cidade').value=end.cidade||'';
  if(document.getElementById('ck-comp'))document.getElementById('ck-comp').value=end.complemento||'';
  toast('Endereço preenchido!');
}

async function buscarCEP(){
  const cep=document.getElementById('ck-cep')?.value.replace(/\D/g,'');
  if(cep?.length!==8)return;
  try{
    const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    const d=await r.json();
    if(d.erro)return;
    if(document.getElementById('ck-rua'))document.getElementById('ck-rua').value=d.logradouro||'';
    if(document.getElementById('ck-bairro'))document.getElementById('ck-bairro').value=d.bairro||'';
    if(document.getElementById('ck-cidade'))document.getElementById('ck-cidade').value=d.localidade||'';
    document.getElementById('ck-num')?.focus();
  }catch(e){}
}

function buscarProdutos(termo){
  const t=norm(termo);
  const ativos=produtos.filter(p=>p.ativo&&p.estoque>0);
  const enc=ativos.filter(p=>norm(p.nome).includes(t)||norm(p.marca).includes(t)||p.tags.some(tg=>tg.includes(t)));
  const ind=INDISPONIVEIS.find(p=>norm(p.nome).includes(t)||p.tags.some(tg=>tg.includes(t)));
  let sim=[];
  if(ind&&enc.length===0) sim=ativos.filter(p=>p.cat===ind.cat&&p.tags.some(tg=>ind.tags.includes(tg)));
  return{enc,ind,sim};
}

// Regras iniciais (ponto de partida); editável pelo admin em "Combina com"

const COMBINA_COM_PADRAO = {
  achocolatado:['leite','condensado','farinha','manteiga'],
  leite:['achocolatado','cafe','condensado','farinha','biscoito'],
  condensado:['leite','achocolatado','manteiga'],
  cafe:['leite','acucar','biscoito'],
  farinha:['ovos','manteiga','acucar','fermento','achocolatado'],
  fermento:['farinha','ovos','acucar'],
  ovos:['farinha','fermento','manteiga'],
  acucar:['cafe','farinha','biscoito'],
  arroz:['feijao','oleo'],
  feijao:['arroz','carne','linguica'],
  macarrao:['queijo','molho'],
  pao:['manteiga','queijo','presunto'],
  biscoito:['cafe','leite','achocolatado'],
  carne:['carvao','sal','arroz'],
  frango:['arroz','tempero'],
  refri:['gelo','carvao'],
  cerveja:['gelo','carvao','salgadinho'],
  detergente:['esponja','bucha'],
  sabao:['amaciante','alvejante'],
  shampoo:['condicionador','sabonete'],
  pasta:['fio dental','escova'],
};
let COMBINA_COM = JSON.parse(localStorage.getItem('ma_combina') || 'null') || {...COMBINA_COM_PADRAO};

// retorna produtos (até `max`) cujas tags combinam com as tags do produto base,
// excluindo o próprio produto e qualquer item já presente no carrinho
function produtosCombinaCom(produtoBase, max){
  max = max||4;
  const tagsAlvo = new Set();
  (produtoBase.tags||[]).forEach(tg=>{
    (COMBINA_COM[tg]||[]).forEach(t2=>tagsAlvo.add(t2));
  });
  if(tagsAlvo.size===0) return [];
  const idsCarrinho = new Set(carrinho.map(i=>i.id));
  return produtos
    .filter(p=>p.ativo && p.estoque>0 && p.id!==produtoBase.id && !idsCarrinho.has(p.id))
    .filter(p=>p.tags.some(tg=>tagsAlvo.has(tg)))
    .slice(0,max);
}

// junta sugestões para todos os itens do carrinho, sem repetir produto
function combinaComCarrinho(max){
  max = max||3;
  const vistos = new Set();
  const idsCarrinho = new Set(carrinho.map(i=>i.id));
  const out=[];
  for(const item of carrinho){
    const base = produtos.find(p=>p.id===item.id);
    if(!base) continue;
    for(const sug of produtosCombinaCom(base, 6)){
      if(vistos.has(sug.id) || idsCarrinho.has(sug.id)) continue;
      vistos.add(sug.id);
      out.push(sug);
      if(out.length>=max) return out;
    }
  }
  return out;
}

async function buscarCEPCadastro(){
  const cep=document.getElementById('cd-cep')?.value.replace(/\D/g,'');
  if(cep?.length!==8)return;
  try{const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');const d=await r.json();if(d.erro)return;if(document.getElementById('cd-rua'))document.getElementById('cd-rua').value=d.logradouro||'';if(document.getElementById('cd-bairro'))document.getElementById('cd-bairro').value=d.bairro||'';if(document.getElementById('cd-cidade'))document.getElementById('cd-cidade').value=d.localidade||'';}catch(e){}
}

function validarCPF(cpf){
  cpf=cpf.replace(/\D/g,'');
  if(cpf.length!==11||/^(\d)\1+$/.test(cpf))return false;
  let s=0;for(let i=0;i<9;i++)s+=parseInt(cpf[i])*(10-i);
  let r=(s*10)%11;if(r===10||r===11)r=0;if(r!==parseInt(cpf[9]))return false;
  s=0;for(let i=0;i<10;i++)s+=parseInt(cpf[i])*(11-i);
  r=(s*10)%11;if(r===10||r===11)r=0;return r===parseInt(cpf[10]);
}

  if(!nome||!cpf||!tel||!email||!senha||!cep||!num){toast('Preencha todos os campos *');return;}
  if(!validarCPF(cpf)){toast('CPF inválido');return;}
  if(senha.length<6){toast('Senha precisa ter mínimo 6 caracteres');return;}
  const usuarios=JSON.parse(localStorage.getItem('ma_usuarios')||'[]');
  if(usuarios.find(u=>u.email===email)){toast('E-mail já cadastrado');return;}
  const u={id:Date.now(),nome,cpf,telefone:tel,email,senha,endereco:{cep,numero:num,rua:document.getElementById('cd-rua')?.value||'',bairro:document.getElementById('cd-bairro')?.value||'',cidade:document.getElementById('cd-cidade')?.value||''},criadoEm:new Date().toISOString()};
  usuarios.push(u);
  localStorage.setItem('ma_usuarios',JSON.stringify(usuarios));
  usuario=u;salvar();
  toast(ic('check-circle')+'Conta criada');pagina='site';render();
}

function avancarPedido(id){
  const p=pedidos.find(x=>x.id===id); if(!p)return;
  const SQ=['aguardando_pagamento','pagamento_confirmado','em_separacao','saiu_entrega','entregue'];
  const SQR=['aguardando_pagamento','pagamento_confirmado','em_separacao','pronto_retirada','retirado'];
  const s=p.tipoEntrega==='retirada'?SQR:SQ;
  const i=s.indexOf(p.status);
  if(i<s.length-1){p.status=s[i+1];salvar();toast(ic('check-circle')+'Status atualizado');render();}
}

function lerFaixasForm(){
  const faixas=[];
  let i=0;
  while(document.getElementById('faixa-ate-'+i)){
    const ateEl=document.getElementById('faixa-ate-'+i);
    const vkmEl=document.getElementById('faixa-vkm-'+i);
    const ate=parseFloat(ateEl?.value)||999;
    const vkm=parseFloat(vkmEl?.value)||0;
    if(vkm>0) faixas.push({ate,valorPorKm:vkm});
    i++;
  }
  return faixas.sort((a,b)=>a.ate-b.ate);
}

function adicionarFaixaFrete(){
  const faixas=lerFaixasForm();
  CONFIG.faixasFrete=[...faixas,{ate:999,valorPorKm:0.40}];
  render();
  setTimeout(()=>document.getElementById('cfg-faixas-lista')?.scrollIntoView({behavior:'smooth',block:'end'}),50);
}

function removerFaixaFrete(idx){
  const faixas=lerFaixasForm();
  faixas.splice(idx,1);
  CONFIG.faixasFrete=faixas;
  render();
}

async function salvarConfiguracoes(){
  const btn=document.getElementById('cfg-salvar-btn');
  if(btn){btn.disabled=true;btn.innerHTML=ic('clock')+' Salvando...';}

  CONFIG.mpAccessToken=document.getElementById('cfg-mp-token')?.value.trim()||'';
  CONFIG.mpPublicKey=document.getElementById('cfg-mp-pk')?.value.trim()||'';
  CONFIG.orsApiKey=document.getElementById('cfg-ors-key')?.value.trim()||'';
  const hexInput=document.getElementById('cfg-cor-hex-input')?.value.trim()||'';
  CONFIG.corHeader=(/^#[0-9A-Fa-f]{6}$/.test(hexInput)?hexInput:document.getElementById('cfg-cor')?.value)||'#0B2218';
  document.documentElement.style.setProperty('--header-cor',CONFIG.corHeader);
  CONFIG.mercadoRua=document.getElementById('cfg-rua')?.value.trim()||'';
  CONFIG.mercadoNumero=document.getElementById('cfg-num')?.value.trim()||'';
  CONFIG.mercadoBairro=document.getElementById('cfg-bairro')?.value.trim()||'';
  CONFIG.mercadoCidade=document.getElementById('cfg-cidade')?.value.trim()||'Ibitirama';
  CONFIG.mercadoEstado=(document.getElementById('cfg-estado')?.value.trim()||'ES').toUpperCase();
  CONFIG.mercadoCEP=document.getElementById('cfg-cep')?.value.trim()||'';
  CONFIG.freteGratisAcima=parseFloat(document.getElementById('cfg-frete-gratis')?.value)||0;
  CONFIG.freteMinimo=parseFloat(document.getElementById('cfg-frete-min')?.value)||5;
  CONFIG.whatsapp=document.getElementById('cfg-whatsapp')?.value.trim()||'';
  CONFIG.bannerAutoplay=Math.max(2,Math.min(30,parseInt(document.getElementById('cfg-autoplay')?.value)||5));
  CONFIG.faixasFrete=lerFaixasForm();
  // Invalida geocode anterior para forçar re-geocodificação
  CONFIG.mercadoLat=null; CONFIG.mercadoLng=null;
  salvar();

  // Geocodifica endereço do mercado se chave ORS preenchida
  if(CONFIG.orsApiKey){
    if(btn) btn.innerHTML=ic('clock')+' Geocodificando endereço...';
    const ok=await geocodificarMercado();
    if(ok) toast(ic('check-circle')+' Configurações salvas e endereço localizado!');
    else toast(ic('alert')+' Configurações salvas, mas não foi possível localizar o endereço. Verifique a chave ORS e o endereço.');
  } else {
    toast(ic('check-circle')+' Configurações salvas');
  }
  if(btn){btn.disabled=false;btn.innerHTML=ic('check')+' Salvar todas as configurações';}
  render();
}

let _bannerEditIdx = null;

  document.getElementById('bnt-cor-fields').style.display=tipo==='cor'?'':'none';

async function uploadBannerImagem(){
  if(!fbPronto()) return;
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=async()=>{
    const file=input.files[0]; if(!file) return;
    const btn=document.getElementById('bn-img-btn');
    const nomeEl=document.getElementById('bn-img-nome');
    if(btn){btn.disabled=true; btn.innerHTML=ic('clock')+' Enviando...';}
    try{
      const blob=await comprimirImagem(file,1440,0.88);
      const bannerIdx=_bannerEditIdx!==null?_bannerEditIdx:('new_'+Date.now());
      const caminho=`banners/banner-${bannerIdx}.jpg`;
      const uploadUrl=`${fbObjURL(caminho)}?uploadType=media&key=${FB_API_KEY}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Content-Type':'image/jpeg','X-Goog-Upload-Protocol':'raw'},body:blob});
      if(!res.ok){const err=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(err?.error?.message||res.statusText);}
      const meta=await res.json();
      const url=`${fbObjURL(caminho)}?alt=media&token=${meta.downloadTokens}`;
      _bannerImgUrl=url;
      // preview
      const prev=document.getElementById('bn-img-preview');
      if(prev) prev.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
      if(nomeEl) nomeEl.innerHTML=`<span style="color:var(--forest-700);font-weight:600;">${ic('check-circle')} ${file.name}</span>`;
      if(btn){btn.disabled=false; btn.innerHTML=ic('edit')+' Trocar imagem';}
      toast(ic('check-circle')+' Imagem enviada');
    }catch(e){
      toast(ic('alert')+' Erro: '+e.message);
      if(btn){btn.disabled=false; btn.innerHTML=ic('edit')+' Escolher imagem';}
    }
  };
  input.click();
}

async function uploadBannerVideo(){
  if(!fbPronto()) return;
  const input=document.createElement('input');
  input.type='file'; input.accept='video/mp4,video/*';
  input.onchange=async()=>{

      const res=await fetch(uploadUrl,{method:'POST',headers:{'Content-Type':'video/mp4','X-Goog-Upload-Protocol':'raw'},body:file});
      if(!res.ok){const err=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(err?.error?.message||res.statusText);}
      const meta=await res.json();
      const url=`${fbObjURL(caminho)}?alt=media&token=${meta.downloadTokens}`;
      _bannerVidUrl=url;
      const prev=document.getElementById('bn-vid-preview');
      if(prev) prev.innerHTML=`<video src="${url}" style="width:100%;height:100%;object-fit:cover;" muted></video>`;
      if(nomeEl) nomeEl.innerHTML=`<span style="color:var(--forest-700);font-weight:600;">${ic('check-circle')} ${file.name}</span>`;
      if(btn){btn.disabled=false; btn.innerHTML=ic('play')+' Trocar vídeo';}

      toast(ic('alert')+' Erro: '+e.message);
      if(nomeEl) nomeEl.textContent='Erro no upload. Tente novamente.';
      if(btn){btn.disabled=false; btn.innerHTML=ic('play')+' Escolher vídeo';}

}

function salvarBanner(){
  const tipo=document.querySelector('input[name="bn-tipo"]:checked')?.value||'cor';
  const cor1=(tipo==='imagem'?document.getElementById('bn-cor1-img'):document.getElementById('bn-cor1'))?.value||'#0B2218';
  const cor2=(tipo==='imagem'?document.getElementById('bn-cor2-img'):document.getElementById('bn-cor2'))?.value||'#1F5C3F';
  const titulo=document.getElementById('bn-titulo')?.value.trim();
  const titulo2=document.getElementById('bn-titulo2')?.value.trim();
  if(!titulo){toast(ic('alert')+' Informe o título');return;}
  if(tipo==='imagem'&&!_bannerImgUrl){toast(ic('alert')+' Envie uma imagem primeiro');return;}
  if(tipo==='video'&&!_bannerVidUrl){toast(ic('alert')+' Envie um vídeo primeiro');return;}
  const banner={
    id: _bannerEditIdx!==null ? BANNERS[_bannerEditIdx].id : Date.now(),
    titulo, titulo2: titulo2||'',
    sub: document.getElementById('bn-sub')?.value.trim()||'',
    eyebrow: document.getElementById('bn-eyebrow')?.value.trim()||'',
    eyebrowIcon: document.getElementById('bn-eyebrowicon')?.value||'new',
    btnTexto: document.getElementById('bn-btn')?.value.trim()||'',
    btnAcao: document.getElementById('bn-acao')?.value||'produtos',
    tipo, cor: cor1+','+cor2,
    imgUrl: tipo==='imagem'?_bannerImgUrl:'',
    videoUrl: tipo==='video'?_bannerVidUrl:'',
    ativo: _bannerEditIdx!==null ? BANNERS[_bannerEditIdx].ativo : true,
  };
  if(_bannerEditIdx!==null){
    BANNERS[_bannerEditIdx]=banner;
    toast(ic('check-circle')+' Banner atualizado');
  } else {
    BANNERS.push(banner);
    toast(ic('check-circle')+' Banner adicionado');
  }
  salvar(); _bannerEditIdx=null; _bannerImgUrl=''; _bannerVidUrl=''; render();
}

function editarBanner(i){
  _bannerEditIdx=i;
  const b=BANNERS[i];
  _bannerImgUrl=b.imgUrl||'';
  _bannerVidUrl=b.videoUrl||'';
  render();
  setTimeout(()=>{
    if(!document.getElementById('bn-titulo')) return;
    document.getElementById('bn-titulo').value=b.titulo||'';
    document.getElementById('bn-titulo2').value=b.titulo2||'';
    document.getElementById('bn-sub').value=b.sub||'';
    document.getElementById('bn-eyebrow').value=b.eyebrow||'';
    document.getElementById('bn-eyebrowicon').value=b.eyebrowIcon||'new';
    document.getElementById('bn-btn').value=b.btnTexto||'';
    document.getElementById('bn-acao').value=b.btnAcao||'produtos';
    const tipo=b.tipo||'cor';
    document.getElementById('bnt-cor').checked=(tipo==='cor');
    document.getElementById('bnt-img').checked=(tipo==='imagem');
    document.getElementById('bnt-vid').checked=(tipo==='video');
    toggleBannerTipo();
    if(b.cor){
      const [c1,c2]=b.cor.split(',');
      if(document.getElementById('bn-cor1'))document.getElementById('bn-cor1').value=c1||'#0B2218';

function norm_tag(s){return (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function salvarRegraCombina(){
  const tag=norm_tag(document.getElementById('cb-tag')?.value);
  const relTxt=document.getElementById('cb-relacionadas')?.value||'';
  const relacionadas=relTxt.split(',').map(t=>norm_tag(t)).filter(Boolean);
  if(!tag){toast('Informe a tag gatilho');return;}
  if(relacionadas.length===0){toast('Informe ao menos uma tag relacionada');return;}
  if(combinaEditando && combinaEditando!==tag) delete COMBINA_COM[combinaEditando];
  COMBINA_COM[tag]=relacionadas;
  salvar();
  toast(ic('check-circle')+(combinaEditando?'Regra atualizada':'Regra adicionada'));
  combinaEditando=null;
  render();
}

// ============================================================
// FOTOS DE PRODUTO — Firebase Storage via API REST
// ============================================================

function fbPronto(){
  if(FB_API_KEY==='COLE_AQUI'||FB_BUCKET==='COLE_AQUI'){
    toast(ic('alert')+' Configure FB_API_KEY e FB_BUCKET no topo do arquivo');
    return false;
  }
  return true;
}

// Monta a URL base do objeto no Storage
function fbObjURL(caminho){
  const encoded=encodeURIComponent(caminho);
  return `https://firebasestorage.googleapis.com/v0/b/${FB_BUCKET}/o/${encoded}`;
}

// Upload via fetch (multipart/form-data não funciona com Storage REST;
// usa upload simples com Content-Type direto)
async function uploadFotoProd(prodId){
  if(!fbPronto()) return;
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=async()=>{
    const file=input.files[0]; if(!file) return;

    // Atualiza botão na tabela ou no modal
    const btn=document.getElementById(`foto-btn-${prodId}`);
    if(btn){btn.disabled=true; btn.innerHTML=ic('clock')+' Enviando...';}

    try{
      // 1. Comprime a imagem
      const blob=await comprimirImagem(file,800,0.82);

      // 2. Faz upload via REST — PUT com token de autenticação anônimo
      //    O Storage aceita upload público quando as regras permitem write: if true
      const caminho=`produtos/${prodId}.jpg`;
      const uploadUrl=`${fbObjURL(caminho)}?uploadType=media&key=${FB_API_KEY}`;

      const res=await fetch(uploadUrl,{
        method:'POST',
        headers:{'Content-Type':'image/jpeg','X-Goog-Upload-Protocol':'raw'},
        body:blob
      });

      if(!res.ok){
        const err=await res.json().catch(()=>({error:{message:res.statusText}}));
        throw new Error(err?.error?.message||res.statusText);
      }

      // 3. Pega a URL pública de download
      const meta=await res.json();
      const downloadToken=meta.downloadTokens;
      const url=`${fbObjURL(caminho)}?alt=media&token=${downloadToken}`;

      // 4. Salva no produto
      const p=produtos.find(x=>x.id===prodId);
      if(p){p.foto=url; salvar();}
      toast(ic('check-circle')+' Foto salva');
      render();

    } catch(e){
      console.error('Upload erro:',e);
      toast(ic('alert')+' Erro: '+e.message);
      if(btn){btn.disabled=false; btn.innerHTML=ic('edit')+' Foto';}
    }
  };
  input.click();
}

// Remove a foto do Storage e do produto
async function removerFotoProd(prodId){
  if(!fbPronto()) return;
  if(!confirm('Remover a foto deste produto?')) return;
  try{
    const caminho=`produtos/${prodId}.jpg`;
    await fetch(`${fbObjURL(caminho)}?key=${FB_API_KEY}`,{method:'DELETE'});
  } catch(e){ /* ignora se arquivo não existir */ }
  const p=produtos.find(x=>x.id===prodId);
  if(p){delete p.foto; salvar();}
  toast(ic('check-circle')+' Foto removida');
  render();
}

// Comprime imagem via canvas (reduz tamanho antes do upload)
function comprimirImagem(file,maxPx,qualidade){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){
        if(w>h){h=Math.round(h*(maxPx/w));w=maxPx;}
        else{w=Math.round(w*(maxPx/h));h=maxPx;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',qualidade);
    };
    img.src=url;
  });
}


function render(){
  // Preserva foco/cursor do campo de busca para não "travar" a digitação a cada letra
  const activeEl=document.activeElement;
  const wasSearchFocused=activeEl&&activeEl.id==='searchInput';
  const cursorPos=wasSearchFocused?activeEl.selectionStart:null;

  let html='';
  if(pagina==='admin')      html=htmlAdmin();
  else if(pagina==='login') html=htmlLogin();
  else if(pagina==='cadastro') html=htmlCadastro();
  else if(pagina==='conta') html=htmlConta();
  else if(pagina==='meus-pedidos') html=htmlMeusPedidos();
  else                      html=htmlSite();
  document.getElementById('app').innerHTML=html;

  if(wasSearchFocused){
    const newInput=document.getElementById('searchInput');
    if(newInput){
      newInput.focus();
      newInput.setSelectionRange(cursorPos,cursorPos);
      document.getElementById('sdrop')?.classList.add('open');
    }
  }

  // Atualizar contador bottom nav / header
  const cn=qtdTotal();
  ['cartCount'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=cn;});

  // Inicializa carousels após cada render
  initHeroCarousel();
  initPromoSlider();
}

// ============================================================
// HERO CAROUSEL — escopo global, reinicia a cada render()
// ============================================================
let _heroTimer=null;
let _heroCur=0;
let _heroTotal=0;

function initHeroCarousel(){
  clearInterval(_heroTimer);
  _heroTotal=document.querySelectorAll('.hero-slide').length;
  if(_heroTotal<=1) return;
  _heroCur=0;
  _heroGoTo(0);
  const intervalo=(CONFIG.bannerAutoplay||5)*1000;
  _heroTimer=setInterval(()=>_heroGoTo(_heroCur+1), intervalo);
}

function _heroGoTo(n){
  _heroCur=(n+_heroTotal)%_heroTotal;
  const track=document.getElementById('heroTrack');
  if(track) track.style.transform='translateX(-'+(_heroCur*100)+'%)';
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===_heroCur));
}

function heroSlide(dir){
  clearInterval(_heroTimer);
  _heroGoTo(_heroCur+dir);
  const intervalo=(CONFIG.bannerAutoplay||5)*1000;
  _heroTimer=setInterval(()=>_heroGoTo(_heroCur+1), intervalo);
}

function heroGoTo(n){
  clearInterval(_heroTimer);
  _heroGoTo(n);
  const intervalo=(CONFIG.bannerAutoplay||5)*1000;
  _heroTimer=setInterval(()=>_heroGoTo(_heroCur+1), intervalo);
}

// ---- PROMO SLIDER ----
let _promoIdx=0;
function initPromoSlider(){ _promoIdx=0; }
function promoSlide(dir){
  const t=document.getElementById('promoTrack'); if(!t)return;
  const cardW=(t.children[0]?.offsetWidth||240)+16;
  const max=Math.max(0,t.children.length-Math.floor(t.parentElement.offsetWidth/cardW));
  _promoIdx=Math.max(0,Math.min(_promoIdx+dir,max));
  t.style.transform='translateX(-'+(_promoIdx*cardW)+'px)';
}

// INIT
render();
renderCarrinho();
</script>
